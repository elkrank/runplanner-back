openapi: 3.1.0
info:
  title: RunPlan API
  version: 1.0.0
  description: >
    API pour alimenter RunPlan (entraînement, sommeil, poids, stats hebdo).
servers:
  - url: https://api.runplan.app/v1
    description: Production
  - url: http://localhost:3000/v1
    description: Local

tags:
  - name: Profile
  - name: Weeks
  - name: Sessions
  - name: Sleep
  - name: Weight
  - name: Stats

security:
  - bearerAuth: []

paths: {}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
